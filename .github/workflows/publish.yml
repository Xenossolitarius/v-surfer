name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Lint & Typecheck
        run: pnpm lint && pnpm check-format && pnpm typecheck

      # Build before tests: test/build/exports.test.ts (in the unit project)
      # validates the generated dist/ tree, so dist/ must exist first.
      - name: Build package
        run: pnpm build

      - name: Unit + SSR + type tests
        run: pnpm vitest run --project unit --project ssr --project types

      # v-surfer publishes the generated dist/ tree (dist/package.json is produced
      # by the build from src/copy/package.json). Stamp it with the release version.
      - name: Set version from release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cd dist
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd dist && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
